<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1a17"/>
      <stop offset="1" stop-color="#2a2721"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#e9d9b0"/>
      <stop offset=".5"  stop-color="#b08a3e"/>
      <stop offset="1"   stop-color="#8a6a26"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="88" fill="url(#g)"/>
  <!-- book spine -->
  <rect x="80" y="90" width="352" height="332" rx="20" fill="#f8f4ea"/>
  <rect x="80" y="90" width="32"  height="332" rx="20" fill="#b08a3e"/>
  <!-- ruled lines -->
  <g stroke="#d9cfb3" stroke-width="2" opacity=".7">
    <line x1="140" y1="160" x2="400" y2="160"/>
    <line x1="140" y1="200" x2="400" y2="200"/>
    <line x1="140" y1="240" x2="400" y2="240"/>
    <line x1="140" y1="280" x2="400" y2="280"/>
    <line x1="140" y1="320" x2="400" y2="320"/>
    <line x1="140" y1="360" x2="400" y2="360"/>
  </g>
  <!-- monogram د in Arabic -->
  <text x="272" y="310" font-family="Reem Kufi, Tajawal, sans-serif"
        font-size="220" font-weight="700"
        text-anchor="middle" fill="url(#gold)">د</text>
</svg>
